<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南韩女团投胎指南</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0ece4;--muted:#888;--accent:#e8c97a;--accent2:#c85a5a;--accent3:#7ab8e8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

#intro{align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem;position:relative;}
#intro::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 41px);pointer-events:none;}
.intro-eyebrow{font-size:10px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:2rem;}
.intro-title{font-family:'Noto Serif SC',serif;font-size:clamp(2rem,7vw,3.8rem);font-weight:900;line-height:1.1;margin-bottom:1rem;color:var(--text);}
.intro-title em{color:var(--accent);font-style:normal;}
.intro-sub{font-size:14px;color:var(--muted);line-height:1.9;max-width:360px;margin:0 auto 2.5rem;}
.btn-start{background:var(--accent);color:#0e0e0e;border:none;padding:15px 48px;font-size:15px;font-weight:700;font-family:'Noto Sans SC',sans-serif;cursor:pointer;letter-spacing:2px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all 0.2s;}
.btn-start:hover{background:#f5d98a;transform:translateY(-2px);}
.intro-note{margin-top:1.2rem;font-size:11px;color:var(--muted);}

#quiz{padding:2rem 1.5rem;max-width:640px;margin:0 auto;width:100%;}
.quiz-header{margin-bottom:2rem;}
.progress-bar{height:2px;background:rgba(255,255,255,0.08);margin-bottom:10px;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease;}
.progress-text{font-size:11px;color:var(--muted);letter-spacing:2px;}
.question-card{background:var(--bg2);border:1px solid var(--border);padding:2rem;margin-bottom:1.5rem;position:relative;}
.question-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);}
.q-num{font-size:10px;letter-spacing:3px;color:var(--accent);margin-bottom:1rem;}
.q-text{font-family:'Noto Serif SC',serif;font-size:clamp(15px,3.5vw,18px);line-height:1.7;color:var(--text);}
.options{display:flex;flex-direction:column;gap:8px;}
.option{background:var(--bg2);border:1px solid var(--border);padding:14px 18px;font-size:13px;line-height:1.65;color:var(--muted);cursor:pointer;text-align:left;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;display:flex;align-items:flex-start;gap:12px;}
.option:hover{border-color:var(--border2);color:var(--text);background:var(--bg3);}
.option.selected{border-color:var(--accent);color:var(--text);background:rgba(232,201,122,0.06);}
.opt-letter{width:20px;min-width:20px;height:20px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);margin-top:2px;flex-shrink:0;}
.option.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#0e0e0e;font-weight:700;}
.quiz-nav{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}
.btn-back{background:none;border:1px solid var(--border);padding:10px 22px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;}
.btn-back:hover{border-color:var(--border2);color:var(--text);}
.btn-back:disabled{opacity:0.2;cursor:default;}
.btn-next{background:none;border:1px solid var(--accent);padding:10px 28px;font-size:13px;cursor:pointer;color:var(--accent);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;opacity:0.3;pointer-events:none;letter-spacing:1px;}
.btn-next.ready{opacity:1;pointer-events:auto;}
.btn-next.ready:hover{background:var(--accent);color:#0e0e0e;}

#loading{align-items:center;justify-content:center;text-align:center;padding:3rem;}
.loading-bar{width:200px;height:2px;background:var(--bg3);margin:0 auto 1.5rem;overflow:hidden;}
.loading-bar-fill{height:100%;background:var(--accent);animation:loadbar 1.8s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}100%{width:0;margin-left:100%;}}
.loading-text{font-size:12px;color:var(--muted);letter-spacing:3px;}

#result{padding:2rem 1.5rem 5rem;max-width:640px;margin:0 auto;width:100%;}
.result-eyebrow{font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;padding-top:0.5rem;}
.result-name{font-family:'Noto Serif SC',serif;font-size:clamp(2.4rem,9vw,4rem);font-weight:900;color:var(--accent);line-height:1;margin-bottom:0.3rem;}
.result-tag{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:1.5rem;}
.result-verdict{font-size:14px;line-height:1.95;color:rgba(240,236,228,0.85);border-left:2px solid var(--accent);padding-left:1.2rem;margin-bottom:2rem;}
.multi-badge{display:inline-block;background:var(--accent2);color:#fff;font-size:11px;padding:4px 12px;letter-spacing:2px;margin-bottom:1rem;}
.multi-cards{display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem;}
.multi-card{background:var(--bg2);border:1px solid var(--border);padding:1.2rem 1.5rem;}
.multi-card-name{font-family:'Noto Serif SC',serif;font-size:1.6rem;font-weight:900;color:var(--accent);margin-bottom:0.3rem;}
.multi-card-tag{font-size:12px;color:var(--muted);margin-bottom:0.8rem;}
.multi-card-verdict{font-size:13px;line-height:1.85;color:rgba(240,236,228,0.8);}
.section-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}
.dims-card{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center;}
.radar-wrap{width:100%;max-width:320px;margin:0 auto;}
.radar-wrap svg{width:100%;height:auto;display:block;}
.radar-labels{position:relative;}
.destiny-card{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem;cursor:pointer;}
.destiny-card-header{display:flex;justify-content:space-between;align-items:center;}
.destiny-main{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.destiny-toggle{font-size:11px;color:var(--muted);}
.destiny-detail{margin-top:1.2rem;display:none;border-top:1px solid var(--border);padding-top:1.2rem;}
.destiny-detail.open{display:block;}
.destiny-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.destiny-bar-label{font-size:11px;color:var(--muted);width:68px;min-width:68px;text-align:right;}
.destiny-bar-track{flex:1;height:3px;background:rgba(255,255,255,0.06);}
.destiny-bar-fill{height:100%;background:var(--accent3);transition:width 0.8s ease;}
.destiny-bar-val{font-size:10px;color:var(--muted);width:28px;text-align:right;}
.destiny-review{margin-top:1rem;font-size:13px;line-height:1.85;color:rgba(240,236,228,0.75);}
.destiny-tag-list{display:flex;flex-direction:column;gap:1rem;margin-top:0.2rem;}
.destiny-tag-item{border-top:1px solid var(--border);padding-top:1rem;}
.destiny-tag-item:first-child{border-top:none;padding-top:0;}
.destiny-tag-name{font-size:11px;letter-spacing:2px;color:var(--accent3);margin-bottom:0.4rem;text-transform:uppercase;font-weight:500;}
.destiny-tag-desc{font-size:13px;line-height:1.85;color:rgba(240,236,228,0.75);}
.divider{height:1px;background:var(--border);margin:1.5rem 0;}
.btn-share{display:block;width:100%;margin-top:1rem;background:none;border:1px solid var(--accent);padding:13px;font-size:13px;cursor:pointer;color:var(--accent);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;letter-spacing:2px;}
.btn-share:hover{background:var(--accent);color:#0e0e0e;}
.btn-retry{display:block;width:100%;margin-top:8px;background:none;border:1px solid var(--border);padding:13px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;letter-spacing:1px;}
.btn-retry:hover{border-color:var(--border2);color:var(--text);}
@media(max-width:480px){#quiz,#result{padding:1.5rem 1rem 3rem;}}
</style>
</head>
<body>

<div id="intro" class="screen active">
  <p class="intro-eyebrow">重生之我在南韩做女团</p>
  <h1 class="intro-title">你是哪个<br><em>K-pop 女团</em></h1>
  <p class="intro-sub">12道灵魂拷问<br>测测你投胎能进哪个南韩女团</p>
  <button class="btn-start" onclick="startQuiz()">开始测试</button>
  <p class="intro-note">约 3～4 分钟完成</p>
</div>

<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="progress-text" id="progressText">1 / 12</p>
  </div>
  <div class="question-card">
    <p class="q-num" id="qNum">Q 01</p>
    <p class="q-text" id="qText"></p>
  </div>
  <div class="options" id="optionsWrap"></div>
  <div class="quiz-nav">
    <button class="btn-back" id="btnBack" onclick="goBack()" disabled>← 上一题</button>
    <button class="btn-next" id="btnNext" onclick="goNext()">下一题 →</button>
  </div>
</div>

<div id="loading" class="screen">
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <p class="loading-text">正在查档…</p>
</div>

<div id="result" class="screen">
  <p class="result-eyebrow" id="rEyebrow">测试结果</p>
  <div id="resultMain"></div>
  <div class="divider"></div>
  <p class="section-label">你的四维画像</p>
  <div class="dims-card" id="dimsCard"></div>
  <p class="section-label" style="margin-top:1.5rem">命运标签</p>
  <div class="destiny-card" id="destinyCard" onclick="toggleDestiny()">
    <div class="destiny-card-header">
      <span class="destiny-main" id="destinyMain"></span>
      <span class="destiny-toggle" id="destinyToggle">点击查看详情 ▾</span>
    </div>
    <div class="destiny-detail" id="destinyDetail"></div>
  </div>
  <button class="btn-share" id="shareBtn">复制结果文案</button>
  <button class="btn-retry" onclick="resetQuiz()">再测一次</button>
</div>

<script>
const DIM_NAMES  = ["社交磁场","审美倾向","团队模式","核心竞争力"];
const DIM_LOW    = ["佛系边界感","极致小众","极致端水","天生磁场"];
const DIM_HIGH   = ["撕逼体质","极致大众","单核拖飞机","硬核实力"];
const DESTINY_NAMES = ["海外开花","高国民度","白月光","命硬","特立独行"];

const DESTINY_REVIEWS = {
  海外开花:"在你的人生地图中，家门口的路一直修不好，但一出国反而一路开绿灯。本土被嫌弃，海外被封神，完美诠释了南韩女团的「墙内开花墙外香，东边不亮西边亮」。",
  高国民度:"你火到连南韩大妈的广场舞同伴都认识你。这条路走的是绝对的规模效应。先用大营销打穿下沉市场，再靠国民度反向收割高端代言资源。简单粗暴，但吸金无敌。",
  白月光:"你的名字永远出现在饭圈「如果当年没解散/没出走就好了」的祭文里。在娱乐圈，比白月光更虐心的是死去的白月光，你靠这套虐粉剧本做到了古今中外通杀。",
  命硬:"天雷打不死，黑料压不垮，恶评绕不过，但你就是他妈的还在这里。你是南韩娱乐圈那种被对家坑、被公司防爆、被媒体黑，年末大赏却偏偏还能拿第一的绝地蟑螂。",
  特立独行:"你的存在本身就是对南韩「爱豆流水线规矩」的冒犯。你不是不会媚俗，你不走大众对女团的甜美刻板印象另辟蹊径，竟然也硬生生杀出了一条血路。"
};

// 12道题打乱顺序（dim标注对应哪个维度）
// 维度：0=社交磁场 1=审美倾向 2=团队模式 3=核心竞争力

  // 社交磁场 0

      {text:"装现场太吵没听清，火速扯开话题：「啊？什么？没听清哎，对了你今天吃饭了吗！」",score:2},
      {text:"偷着乐，还要装的很正经事业心拉满：「我会不负你的期望，让大家骄傲的！」",score:5},

    text:"公司让你定下一次回归的 MV 概念，你更倾向哪个？",

      {text:"废弃医院、血浆，色调暗沉像素差，看十遍都看不懂需要解析的剧情。",score:0},

    ]
  },
  {
    dim:1,
    text:"你的 ins 画风更可能是？",

function getFinalLevel(sum){
  if(sum<=6) return 1;
  if(sum<=9) return 2;
  if(sum<=13) return 3;
  if(sum<=16) return 4;
  return 5;
}

function getPreciseLevel(sum){
  const scoreMap={
    0:0.6, 2:0.8, 4:1.0, 5:1.2, 6:1.4,
    7:1.8, 9:2.2,
    10:2.6, 11:2.8, 12:3.2, 13:3.4,
    14:3.6, 15:4.0, 16:4.4,
    18:4.6, 19:4.8, 20:5.0, 23:5.2, 27:5.4
  };
  return scoreMap[sum]??3.0;
}

function calcDist(u,m){return u.reduce((s,v,i)=>s+(v-m[i])**2,0);}

let cur=0, ans=new Array(12).fill(null), dimRaws=[0,0,0,0];

function startQuiz(){cur=0;ans=new Array(12).fill(null);dimRaws=[0,0,0,0];renderQ();showScreen('quiz');}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function renderQ(){
  const q=QUESTIONS[cur];
  document.getElementById('qNum').textContent='Q '+String(cur+1).padStart(2,'0');
  document.getElementById('qText').textContent=q.text;
  document.getElementById('progressText').textContent=(cur+1)+' / 12';
  document.getElementById('progressFill').style.width=((cur+1)/12*100)+'%';
  document.getElementById('btnBack').disabled=cur===0;
  const wrap=document.getElementById('optionsWrap');
  wrap.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className='option'+(ans[cur]===i?' selected':'');
    btn.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i].text}</span>`;
    btn.onclick=()=>pick(i);
    wrap.appendChild(btn);
  });
  const nb=document.getElementById('btnNext');
  nb.textContent=cur===11?'查看结果 →':'下一题 →';
  nb.classList.toggle('ready',ans[cur]!==null);
}

function pick(i){
  ans[cur]=i;
  document.querySelectorAll('.option').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  document.getElementById('btnNext').classList.add('ready');
}

function goNext(){if(ans[cur]===null)return;if(cur<11){cur++;renderQ();}else calcResult();}
function goBack(){if(cur>0){cur--;renderQ();}}

function calcResult(){
  showScreen('loading');
  dimRaws=[0,0,0,0];
  ans.forEach((a,qi)=>{const q=QUESTIONS[qi];dimRaws[q.dim]+=q.options[a].score;});
  // 第一步：粗粒度层级（1-5整数），用于主匹配
  const userLevels=dimRaws.map(r=>getFinalLevel(r));
  // 第二步：精确小数层级，用于平局时二次区分
  const userPrecise=dimRaws.map(r=>getPreciseLevel(r));
  setTimeout(()=>{
    // 粗匹配：找最小整数距离
    let minDist=Infinity;
    GROUPS_RAW.forEach(g=>{const d=calcDist(userLevels,g.levels);if(d<minDist)minDist=d;});
    let candidates=GROUPS_RAW.filter(g=>calcDist(userLevels,g.levels)===minDist);
    // 精匹配：候选团超过1个时，用精确坐标再算一次距离
    if(candidates.length>1){
      let minDist2=Infinity;
      candidates.forEach(g=>{
        const precLevels=g.levels.map(lv=>{
          // 把团的整数层级映射到该层级的中间精确值
          const midMap={1:1.0, 2:2.0, 3:3.0, 4:4.0, 5:5.0};
          return midMap[lv];
        });
        const d=calcDist(userPrecise,precLevels);
        if(d<minDist2)minDist2=d;
      });
      const refined=candidates.filter(g=>{
        const precLevels=g.levels.map(lv=>({1:1.0,2:2.0,3:3.0,4:4.0,5:5.0}[lv]));
        return Math.abs(calcDist(userPrecise,precLevels)-minDist2)<1e-9;
      });
      candidates=refined;
    }
    showResult(candidates,userLevels);
  },1800);
}

function buildRadar(vals, animate) {
  const CX = 160, CY = 160, R = 100;
  const n = 4;
  // 4轴角度：上/右下/左下/左上，顺时针从顶部开始
  const angles = [
    -Math.PI / 2,           // 顶 (撕逼体制)
    -Math.PI / 2 + Math.PI * 2 / 4,  // 右 (大众)
    -Math.PI / 2 + Math.PI * 4 / 4,  // 底 (单核拖飞机)
    -Math.PI / 2 + Math.PI * 6 / 4,  // 左 (靠硬实力)
  ];

  // 标签位置（稍微往外推）
  const labelR = R + 34;
  const labelPos = angles.map(a => ({
    x: CX + labelR * Math.cos(a),
    y: CY + labelR * Math.sin(a),
  }));

  // 标签文字（两行：中文 + 英文）
  const labels = [
    {zh:'撕逼体制', en:'Social Field'},
    {zh:'大众', en:'Aesthetics'},
    {zh:'单核托飞机', en:'Team Mode'},
    {zh:'靠硬实力', en:'Core Strength'},
  ];

  // 网格多边形（20% 40% 60% 80% 100%）
  function gridPoly(ratio) {
    return angles.map(a =>
      `${CX + R * ratio * Math.cos(a)},${CY + R * ratio * Math.sin(a)}`
    ).join(' ');
  }

  // 用户数据多边形
  const userPts = angles.map((a, i) => {
    const r = Math.max(0.05, vals[i]) * R;
    return `${CX + r * Math.cos(a)},${CY + r * Math.sin(a)}`;
  }).join(' ');

  // 轴线（从中心到顶点）
  const axes = angles.map(a =>
    `<line x1="${CX}" y1="${CY}" x2="${CX + R * Math.cos(a)}" y2="${CY + R * Math.sin(a)}"
      stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`
  ).join('');

  // 网格
  const grids = [0.2, 0.4, 0.6, 0.8, 1].map(r =>
    `<polygon points="${gridPoly(r)}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`
  ).join('');

  // 顶点圆点
  const dots = angles.map((a, i) => {
    const r = Math.max(0.05, vals[i]) * R;
    return `<circle cx="${CX + r * Math.cos(a)}" cy="${CY + r * Math.sin(a)}"
      r="4" fill="#e8c97a" opacity="0.9"/>`;
  }).join('');

  // 标签SVG文字
  const labelsSVG = labelPos.map((pos, i) => {
    const l = labels[i];
    // 文字对齐：左/右/居中
    const anchor = pos.x < CX - 10 ? 'end' : pos.x > CX + 10 ? 'start' : 'middle';
    const yOffset = pos.y < CY ? -8 : 8;
    return `
      <text x="${pos.x}" y="${pos.y + yOffset - 7}" text-anchor="${anchor}"
        font-family="Noto Sans SC,sans-serif" font-size="11" fill="rgba(240,236,228,0.7)"
        font-weight="500">${l.zh}</text>
      <text x="${pos.x}" y="${pos.y + yOffset + 6}" text-anchor="${anchor}"
        font-family="Noto Sans SC,sans-serif" font-size="9" fill="rgba(136,136,136,0.6)">${l.en}</text>`;
  }).join('');

  // CSS动画
  const animStyle = animate ? '' : `
    <style>
      #radarUser { opacity: 0; animation: radarIn 0.6s ease forwards; }
      #radarDots { opacity: 0; animation: radarIn 0.6s ease 0.3s forwards; }
      @keyframes radarIn { to { opacity: 1; } }
    </style>`;

  return `<div class="radar-wrap">
    <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      ${animStyle}
      ${grids}
      ${axes}
      <polygon id="radarUser" points="${userPts}"
        fill="rgba(232,201,122,0.15)" stroke="#e8c97a" stroke-width="1.5"
        stroke-linejoin="round"/>
      <g id="radarDots">${dots}</g>
      ${labelsSVG}
    </svg>
  </div>`;
}

function resetQuiz(){startQuiz();}
</script>
</body>
</html>
